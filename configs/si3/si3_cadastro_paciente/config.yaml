regioes_ocr:
  # ─────────────────────────────────────────────────────────────────
  # BOOTSTRAP MODE — padrao VTAE
  #
  # { x1: 0, y1: 0, x2: 0, y2: 0 } = verificacao DESABILITADA
  # valores reais                   = verificacao HABILITADA (EasyOCR)
  #
  # Como habilitar campo a campo:
  #   1. Rodar o teste e abrir o screenshot do step no Paint
  #   2. Cursor no canto superior-esquerdo do CAMPO (nao do label) -> x1, y1
  #   3. Cursor no canto inferior-direito do CAMPO -> x2, y2
  #   4. Regra: x1 < x2 e y1 < y2 obrigatorio
  #   5. Substituir zeros pelos valores reais
  #   6. Rodar novamente — verify_fill passa a validar o campo
  # ─────────────────────────────────────────────────────────────────

  # CP04 — Nome Social — bootstrap (calibrar com CP04_social.png)
  # CP04 — Nome Social — anchor-based (robusto, sem coordenadas absolutas)
  nome_social:
    anchor_template: templates/si3/cadastro_paciente/label_nome_social.png
    offset_x: 4
    offset_y: -4
    largura: 280
    altura: 14

  # CP05 — Data de Nascimento — bootstrap
  data_nascimento:   { x1: 362, y1: 197, x2: 433, y2: 208 }

  # CP06 — Sexo — bootstrap
  sexo:              { x1: 0, y1: 0, x2: 0, y2: 0 }

  # CP08 — Mae — bootstrap
  nome_mae:          { x1: 0, y1: 0, x2: 0, y2: 0 }

  # CP12 — Cor/Etnia — bootstrap (calibrar com CP12_cor.png)
  cor_etnia:         { x1: 0, y1: 0, x2: 0, y2: 0 }

  # CP14 — Estado Civil — bootstrap
  estado_civil:      { x1: 0, y1: 0, x2: 0, y2: 0 }

  # CP15 — Ocupacao — bootstrap
  ocupacao:          { x1: 0, y1: 0, x2: 0, y2: 0 }

  # Campos mantidos
  nome:              { x1: 37,  y1: 155, x2: 440, y2: 175 }
  hora:              { x1: 460, y1: 193, x2: 530, y2: 210 }
  nacionalidade:     { x1: 620, y1: 193, x2: 830, y2: 210 }
  frequenta_escola:  { x1: 863, y1: 324, x2: 960, y2: 335 }
  rg:                { x1: 50,  y1: 444, x2: 188, y2: 460 }
  cpf:               { x1: 50,  y1: 420, x2: 193, y2: 436 }
  cns:               { x1: 55,  y1: 466, x2: 187, y2: 482 }
  celular:           { x1: 275, y1: 449, x2: 432, y2: 462 }
  email:             { x1: 276, y1: 474, x2: 433, y2: 487 }

  # CP22 — validados — nao alterar
  matricula:         { x1: 557, y1: 148, x2: 626, y2: 172 }
  identificador:     { x1: 455, y1: 148, x2: 525, y2: 166 }