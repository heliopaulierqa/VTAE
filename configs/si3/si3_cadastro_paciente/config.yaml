# configs/si3/si3_cadastro_paciente/config.yaml
# CadastroPacienteFlow — v0.5.12

sistema: si3_cadastro_paciente
tipo: desktop
runner: opencv
ocr_engine: easyocr

ambientes:
  dev:
    url: ''
    confidence: 0.75
    headless: false
    timeout: 30

credenciais:
  usuario: ${SI3_USER}
  senha: ${SI3_PASS}

dados_faker:
  - campo: nome
    tipo: faker
    metodo: name
    transformacao: sem_prefixo_upper

  - campo: nome_social
    tipo: faker
    metodo: name
    transformacao: sem_prefixo_upper

  - campo: nome_pai
    tipo: faker
    metodo: name
    transformacao: sem_prefixo_upper

  - campo: nome_mae
    tipo: faker
    metodo: name
    transformacao: sem_prefixo_upper

  - campo: cpf
    tipo: faker
    metodo: cpf
    transformacao: sem_pontuacao

  - campo: email
    tipo: faker
    metodo: email

  - campo: celular
    tipo: fixo
    valor: '11948657895'

  - campo: sexo
    tipo: random
    opcoes: ['M', 'F']

  - campo: hora
    tipo: fixo
    valor: '00:00'

  - campo: cor_etnia
    tipo: fixo
    valor: 'PARDA'

  - campo: nacionalidade
    tipo: fixo
    valor: 'BRASILEIRA'

  - campo: religiao
    tipo: fixo
    valor: 'CATOLICO'

  - campo: estado_civil
    tipo: fixo
    valor: 'SOLTEIRO'

  - campo: ocupacao
    tipo: fixo
    valor: 'PROFESSOR DE ENSINO PRE ESCOLAR'

  - campo: situacao_familiar
    tipo: fixo
    valor: 'VIVE SO'

  - campo: tipo_deficiencia
    tipo: fixo
    valor: ''

  - campo: escolaridade
    tipo: fixo
    valor: 'SUPERIOR COMPLETO'

  - campo: frequenta_escola
