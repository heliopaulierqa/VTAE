# configs/si3/si3_ambulatorio/config.yaml
# AdmissaoAmbulatorioFlow + AdmissaoComAgendamentoFlow — v0.5.15
# Cenarios de provedor + lista de procedimentos configuravel

sistema: si3_ambulatorio
tipo: desktop
runner: opencv
ocr_engine: easyocr

ambientes:
  dev:
    url: ''
    confidence: 0.75
    headless: false
    timeout: 30

credenciais:
  usuario:     ${SI3_USER}
  senha:       ${SI3_PASS}
  paciente_id: ${SI3_PACIENTE_ID:-}

dados_faker: []  # sem faker — dados fixos para admissao ambulatorial

dados:
  unidade_funcional:  'SC MONITORIZACAO AMBULATORIAL'
  declarante:         'TESTE AUTOMATIZADO'
  especialidade:      'CAR - CARDIO GERAL'
  obs:                'ADMISSAO REALIZADA COM FERRAMENTA DE AUTOMACAO DE TESTES'
  origem_tipo:        'RESIDENCIA'
  termo_menu_amb:     'AMBULATORIO'

  # ----------------------------------------------------------------
  # Cenario de provedor ativo
  # Opcoes: sus | particular | incor_sis | convenio_allianz | convenio_unimed
  # ----------------------------------------------------------------
  cenario_provedor: 'sus'

  cenarios_provedor:

    sus:
      provedor:             'SUS'
      plano:                'SUS'
      numero_carteirinha:   ''
      validade_carteirinha: ''

    particular:
      provedor:             'PARTICULAR'
      plano:                'PARTICULAR'
      numero_carteirinha:   ''
      validade_carteirinha: ''

    incor_sis:
      provedor:             'INCOR SIS'
      plano:                'INCOR - SIS'
      numero_carteirinha:   ''
      validade_carteirinha: ''

    convenio_allianz:
      provedor:             'ALLIANZ'
      plano:                'EXCELLENCE'
      numero_carteirinha:   '54354354353'
      validade_carteirinha: '30/07/2028'

    convenio_unimed:
      provedor:             'UNIMED SEGURADORA'
      plano:                'CORPORATIVO COMPLETO - APARTAMENTO'
      numero_carteirinha:   '54354354353'
      validade_carteirinha: '30/07/2028'

  # ----------------------------------------------------------------
  # Lista de procedimentos
  # Cada item: codigo, complemento, area_executora, profissional
  #   area_executora: '' = clica OK direto no popup sem digitar
  #   area_executora: 'COMISSAO CIENTIFICA' = filtra e seleciona
  # ----------------------------------------------------------------
  procedimentos:

    - codigo:         'SCF-CONS'
      complemento:    'CASO NOVO'
      area_executora: ''
      profissional:   'MEDICO (SÓ PARA USO DA INFORMATICA)'

    # Descomentar para testar multiplos procedimentos apos AB12 estabilizar:
    # - codigo:         'ECG'
    #   complemento:    'SEGUIMENTO'
    #   area_executora: 'COMISSAO CIENTIFICA'
    #   profissional:   'MEDICO'

  # ----------------------------------------------------------------
  # AdmissaoComAgendamentoFlow — dados especificos
  # ----------------------------------------------------------------
  nome_medico_ab: 'MEDICO'

coordenadas:

  # AB01 — campo "Localizar no Menu" na tela de Menu Principal
  campo_localizar_menu:         { x: 635, y: 580 }

  # AB02 — campo Identificador na tela de pesquisa do Ambulatorio
  campo_identificador_amb:      { x: 530, y: 180 }

  # AB04 — campo Tipo na aba Enderecos
  campo_tipo_endereco_amb:      { x: 149, y: 434 }

  # AB05 — AdmissaoComAgendamento: grade de agendamentos
  primeira_linha_grade_ag:      { x: 119,  y: 155 }   # primeira linha da grade
  btn_admitir_ag:               { x: 569,  y: 300 }  # botao Admitir — confirmar com posicao_mouse.py 

  # AB08 — Declarante / Especialidade
  campo_declarante:             { x: 47,  y: 282 }
  campo_especialidade:          { x: 340, y: 280 }

  # AB09 — Obs
  campo_obs_amb:                { x: 74,  y: 348 }

  # AB10 — Origem do Paciente
  campo_origem_tipo:            { x: 57,  y: 408 }

  # AB11 — LOV Medico Responsavel (AdmissaoAmbulatorioFlow)
  btn_lov_medico:               { x: 694, y: 469 }
  campo_localizar_medico:       { x: 286, y: 539 }
  btn_localizar_medico:         { x: 485, y: 753 }
  item_medico_informatica:      { x: 407, y: 620 }

  # AB11 — AdmissaoComAgendamento: campo Nome Medico Responsavel por digitacao
  campo_nome_medico_ab:         { x: 400, y: 400 }   # PENDENTE — calibrar com posicao_mouse.py

  # AB12 — Lista de Procedimentos
  btn_lov_codigo_proc:          { x: 122, y: 237 }
  campo_localizar_proc:         { x: 102, y: 355 }
  btn_localizar_proc:           { x: 394, y: 570 }
  btn_ok_proc:                  { x: 481, y: 521 }

  # Popup area executora
  campo_localizar_area:         { x: 882, y: 523 }
  btn_localizar_area:           { x: 907, y: 736 }
  btn_ok_area_executora:        { x: 1000, y: 736 }

  # LOV Complemento
  btn_lov_complemento:          { x: 556, y: 236 }
  campo_localizar_complemento:  { x: 539, y: 308 }
  btn_localizar_complemento:    { x: 580, y: 598 }
  btn_ok_complemento:           { x: 676, y: 594 }

  # LOV Profissional
  btn_lov_profissional_proc:    { x: 729, y: 239 }
  campo_localizar_profissional: { x: 702, y: 524 }
  btn_localizar_profissional:   { x: 896, y: 732 }
  btn_ok_profissional:          { x: 1002, y: 738 }
  item_profissional_proc:       { x: 728, y: 602 }

  # Proxima linha na grade de procedimentos
  proxima_linha_proc:           { x: 90,  y: 262 }

  # AB15/AB16 — Sair
  btn_sair_1:                   { x: 50,  y: 20  }
  btn_sair_2:                   { x: 20,  y: 574 }

regioes_ocr:

  # AB14/AB15 — Nr Admissao Ambulatorio
  nr_admissao_amb:              { x1: 35,  y1: 131, x2: 136, y2: 155 }

  # Campo Tipo Endereco
  campo_tipo_endereco:          { x1: 133, y1: 431, x2: 178, y2: 442 }

  # Medico Responsavel
  campo_medico_ab:              { x1: 129, y1: 430, x2: 181, y2: 440 }

  # Grade de Procedimentos — calibrar apos AB12 estabilizar
  campo_codigo_proc_ab:         { x1: 35,  y1: 324, x2: 92,  y2: 246 }
  campo_profissional_proc_ab:   { x1: 574, y1: 228, x2: 710, y2: 244 }