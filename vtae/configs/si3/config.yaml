sistema: si3
tipo: desktop
runner: opencv

ambientes:
  dev:
    url: ""
    confidence: 0.7
    headless: false
    timeout: 30.0
  homologacao:
    url: ""
    confidence: 0.7
    headless: false
    timeout: 60.0
  producao:
    url: ""
    confidence: 0.75
    headless: false
    timeout: 60.0

credenciais:
  usuario: ${SI3_USER}
  senha: ${SI3_PASS}

flows:
  - login
  - cadastro_paciente

dados_faker:
  - campo: nome
    tipo: faker
    metodo: name
    transformacao: sem_prefixo_upper
    locale: pt_BR

  - campo: nome_social
    tipo: fixo
    valor: ""

  - campo: data_nascimento
    tipo: faker
    metodo: date_of_birth
    transformacao: null

  - campo: hora
    tipo: fixo
    valor: "00:00"

  - campo: sexo
    tipo: fixo
    valor: "M"

  - campo: nacionalidade
    tipo: fixo
    valor: "BRASILEIRA"

  - campo: mae
    tipo: faker
    metodo: name
    transformacao: sem_prefixo_upper
    locale: pt_BR

  - campo: pai
    tipo: faker
    metodo: name
    transformacao: sem_prefixo_upper
    locale: pt_BR

  - campo: cor_etnia
    tipo: fixo
    valor: "PARDA"

  - campo: cpf
    tipo: faker
    metodo: cpf
    transformacao: sem_pontuacao

configs/si3/config.yaml
notificacoes:
  email:
    destinatarios_padrao:
      - gestor@incor.org.br
      - qa@incor.org.br
    assunto: "VTAE — Resultado {modulo} [{status}] {data}"
    somente_em_falha: false   # true = só envia quando falha