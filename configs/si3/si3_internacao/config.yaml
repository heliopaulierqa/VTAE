  lov_tipo_endereco:
    btn_lov_x: 197
    btn_lov_y: 433
    campo_localizar_x: 193
    campo_localizar_y: 913
    btn_localizar_x: 177
    btn_localizar_y: 361
    btn_ok_x: 295
    btn_ok_y: 911

  # AI09 — campo Obs
  obs:
    x: 108
    y: 346

  # AI10 — campo Tipo da Origem do Paciente
  tipo_origem:
    x: 50
    y: 408

  # AI11 — dropdown Origem da Solicitacao de Internacao
  dropdown_origem_solicitacao:
    x: 643
    y: 458

  # AI12 — campo Matricula do Responsavel
  matricula_responsavel:
    x: 220
    y: 527

  # AI14 — campo Numero dentro do popup Info. Compl.
  numero_medico_popup:
    x: 159
    y: 159

