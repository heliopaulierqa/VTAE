# configs/si3/si3_cadastro_paciente/config.yaml
# CadastroPacienteFlow — Jornada Ambulatório Fase 5a — v0.5.5
#
# Como carregar:
#   config = ConfigLoader.carregar(
#       "si3_cadastro_paciente",
#       configs_dir=pathlib.Path("configs/si3"),
#   )

sistema: si3_cadastro_paciente
tipo: desktop
runner: opencv

ambientes:
  dev:
    url: ''          # vazio para sistemas desktop
    confidence: 0.75
    headless: false
    timeout: 30

credenciais:
  usuario:     ${SI3_USER}
  senha:       ${SI3_PASS}
  paciente_id: ${SI3_PACIENTE_ID:-}   # ← adicionar esta linha

# ---------------------------------------------------------------------------
# dados_faker
#
# data_nascimento e hora são gerados no teste via Faker (faixa de idade
# controlada) e injetados em dados antes de chamar o flow.
# ---------------------------------------------------------------------------
dados_faker:
  - campo: nome
    tipo: faker
    metodo: name
    transformacao: sem_prefixo_upper

  - campo: cpf
    tipo: faker
    metodo: cpf
    transformacao: sem_pontuacao      # CPF sem . e - (Oracle Forms com máscara)

  - campo: email
    tipo: faker
    metodo: email

  - campo: celular
    tipo: faker
    metodo: phone_number

  - campo: nome_mae
    tipo: faker
    metodo: name
    transformacao: sem_prefixo_upper

  - campo: sexo
    tipo: random
    opcoes: ['M', 'F']

  - campo: cor_etnia
    tipo: fixo
    valor: 'PARDA'

  - campo: nacionalidade
    tipo: fixo
    valor: 'BRASILEIRA'

  - campo: naturalidade_uf
    tipo: fixo
    valor: 'SP'

  - campo: naturalidade_municipio
    tipo: fixo
    valor: 'SAO PAULO'

  - campo: religiao
    tipo: fixo
    valor: 'CATOLICISMO'

  - campo: estado_civil
    tipo: fixo
    valor: 'SOLTEIRO'

  - campo: ocupacao
    tipo: fixo
    valor: 'ANALISTA DE RH'

  - campo: situacao_familiar
    tipo: fixo
    valor: 'MORA SOZINHO'

  - campo: tipo_deficiencia
    tipo: fixo
    valor: 'NENHUMA'

  - campo: escolaridade
    tipo: fixo
    valor: 'SUPERIOR COMPLETO'

  - campo: frequenta_escola
    tipo: fixo
    valor: 'N'

  - campo: endereco
    tipo: fixo
    valor:
      cep: '01310100'
      logradouro: 'DR. ENEAS CARVALHO DE AGUIAR'
      numero: '44'
      uf: 'SP'
      municipio: 'SAO PAULO'
      bairro: 'CERQUEIRA CESAR'
      referencia: ''

  # Campos opcionais — vazios por padrão
  - campo: conjuge
    tipo: fixo
    valor: ''

  - campo: responsavel
    tipo: fixo
    valor: ''

  - campo: rg
    tipo: fixo
    valor: ''

  - campo: cns
    tipo: fixo
    valor: ''

# ---------------------------------------------------------------------------
# coordenadas — capturar com: python scripts/posicao_mouse.py
#
# QUANDO usar coordenada vs template:
#   Campo pequeno / na mesma linha que outros → coordenada direta (aqui)
#   Botão único e estável                     → template OpenCV
#   Label de campo grande                     → template OpenCV (click_near)
#
# STATUS: todos com { x: 0, y: 0 } = ainda não capturado.
# Substituir pelos valores reais com o SI3 maximizado na resolução de produção.
# ---------------------------------------------------------------------------
coordenadas:

  # Aba Dados Gerais
  campo_data_nascimento:        { x: 0, y: 0 }   # ← capturar
  campo_hora_nascimento:        { x: 0, y: 0 }   # ← capturar
  campo_sexo:                   { x: 0, y: 0 }   # ← capturar
  campo_cor_etnia:              { x: 0, y: 0 }   # ← capturar
  campo_nacionalidade:          { x: 0, y: 0 }   # ← capturar
  campo_naturalidade_uf:        { x: 0, y: 0 }   # ← capturar
  campo_naturalidade_municipio: { x: 0, y: 0 }   # ← capturar
  campo_conjuge:                { x: 0, y: 0 }   # ← capturar
  campo_responsavel:            { x: 0, y: 0 }   # ← capturar
  campo_nome_mae:               { x: 0, y: 0 }   # ← capturar (fallback CP12)

  # Dropdowns CP13–CP18 — coordenada para ABRIR o dropdown
  campo_religiao:               { x: 0, y: 0 }   # ← capturar
  campo_estado_civil:           { x: 0, y: 0 }   # ← capturar
  campo_ocupacao:               { x: 0, y: 0 }   # ← capturar
  campo_situacao_familiar:      { x: 0, y: 0 }   # ← capturar
  campo_tipo_deficiencia:       { x: 0, y: 0 }   # ← capturar
  campo_escolaridade:           { x: 0, y: 0 }   # ← capturar
  campo_frequenta_escola:       { x: 0, y: 0 }   # ← capturar (S/N ao lado de escolaridade)

  # Aba Documentos CP19
  campo_cpf:                    { x: 0, y: 0 }   # ← capturar — célula Conteúdo linha CIC (linha 2)
  campo_rg:                     { x: 0, y: 0 }   # ← capturar — célula Conteúdo linha RG  (linha 1)
  campo_cns:                    { x: 0, y: 0 }   # ← capturar — célula Conteúdo linha CNS (linha 3)

  # Aba Endereços CP20
  campo_cep:                    { x: 0, y: 0 }   # ← capturar
  campo_logradouro:             { x: 0, y: 0 }   # ← capturar
  campo_numero_endereco:        { x: 0, y: 0 }   # ← capturar
  campo_uf_endereco:            { x: 0, y: 0 }   # ← capturar
  campo_municipio_endereco:     { x: 0, y: 0 }   # ← capturar
  campo_bairro:                 { x: 0, y: 0 }   # ← capturar
  campo_referencia_endereco:    { x: 0, y: 0 }   # ← capturar (opcional)

  # Aba Comunicação CP21
  campo_celular:                { x: 0, y: 0 }   # ← capturar
  campo_email:                  { x: 0, y: 0 }   # ← capturar

# ---------------------------------------------------------------------------
# regioes_ocr — calibrar com o Paint após primeira execução
#
# COMO CALIBRAR:
#   1. Rodar o teste — steps com WARNING "Região não calibrada" → ainda pendente
#   2. Abrir o screenshot do step em evidence/ no Paint
#   3. Cursor no CANTO SUPERIOR-ESQUERDO do campo → x1, y1
#   4. Cursor no CANTO INFERIOR-DIREITO do campo  → x2, y2
#   5. Substituir { x1: 0, y1: 0, x2: 0, y2: 0 } pelos valores reais
#
# Quando (0,0,0,0): assert pulado com WARNING — não falha.
# Quando calibrado: assert ativo — step falha se valor não for encontrado.
#
# PRIORIDADE:
#   1. matricula   → CP22 obrigatório para salvar estado_jornada.json
#   2. nome        → CP02, detecta erro de foco logo no início
#   3. cpf         → CP19, documento crítico
#   4. demais na sequência dos steps
# ---------------------------------------------------------------------------
regioes_ocr:

  # Aba Dados Gerais
  nome:                    { x1: 0, y1: 0, x2: 0, y2: 0 }   # ← calibrar (prioridade 2)
  data_nascimento:         { x1: 0, y1: 0, x2: 0, y2: 0 }   # ← calibrar
  hora_nascimento:         { x1: 0, y1: 0, x2: 0, y2: 0 }   # ← calibrar
  sexo:                    { x1: 0, y1: 0, x2: 0, y2: 0 }   # ← calibrar
  cor_etnia:               { x1: 0, y1: 0, x2: 0, y2: 0 }   # ← calibrar
  nacionalidade:           { x1: 0, y1: 0, x2: 0, y2: 0 }   # ← calibrar
  naturalidade_uf:         { x1: 0, y1: 0, x2: 0, y2: 0 }   # ← calibrar
  naturalidade_municipio:  { x1: 0, y1: 0, x2: 0, y2: 0 }   # ← calibrar
  nome_mae:                { x1: 0, y1: 0, x2: 0, y2: 0 }   # ← calibrar
  frequenta_escola:        { x1: 0, y1: 0, x2: 0, y2: 0 }   # ← calibrar

  # Aba Documentos — células da coluna "Conteúdo" na grade Documentos do Paciente
  # Calibrar abrindo CP19_documentos.png no Paint e anotando a célula de cada linha
  rg:                      { x1: 0, y1: 0, x2: 0, y2: 0 }   # ← calibrar — célula Conteúdo linha RG  (linha 1)
  cpf:                     { x1: 0, y1: 0, x2: 0, y2: 0 }   # ← calibrar — célula Conteúdo linha CIC (linha 2) — prioridade 3
  cns:                     { x1: 0, y1: 0, x2: 0, y2: 0 }   # ← calibrar — célula Conteúdo linha CNS (linha 3)

  # Aba Comunicação
  celular:                 { x1: 0, y1: 0, x2: 0, y2: 0 }   # ← calibrar
  email:                   { x1: 0, y1: 0, x2: 0, y2: 0 }   # ← calibrar

  # Matrícula gerada — calibrar PRIMEIRO (prioridade 1)
  matricula:               { x1: 10, y1: 100, x2: 320, y2: 160 }  # ← calibrar