sistema: si3_cadastro_paciente_min
tipo: desktop
runner: opencv
ocr_engine: easyocr

ambientes:
  dev:
    url: ''
    confidence: 0.75

credenciais:
  usuario: ${SI3_USER}
  senha:   ${SI3_PASS}

dados_faker:
  - campo: nome
    tipo: faker
    metodo: name
    transformacao: sem_prefixo_upper

  - campo: data_nascimento
    tipo: faker
    metodo: date_of_birth
    transformacao: sem_pontuacao

  - campo: data_entrada_brasil
    tipo: faker
    metodo: date_of_birth
    transformacao: sem_pontuacao

  - campo: data_naturalizacao
    tipo: faker
    metodo: date_of_birth
    transformacao: sem_pontuacao

  - campo: nr_portaria
    tipo: faker
    metodo: numerify
    args: "####/####"

# ── Dados fixos — listas para selecao aleatoria no flow ─────────────────────
dados:
  # Cenario de execucao:
  # positivo : dados validos — espera sucesso
  # negativo : dados invalidos — espera deteccao de erro HC-INCOR
  cenario: positivo

  sexo_opcoes:
    - MASCULINO
    - FEMININO

  cor_etnia_opcoes:
    - AMARELA
    - BRANCA
    - PRETA
    - PARDA

  nacionalidade_opcoes:
    - BRASILEIRO
    - ESTRANGEIRO
    - NATURALIZADO

  # ── Popup Brasileiro — pares Estado/Cidade vinculados ────────────────────
  # O flow sorteia o estado e busca a cidade correspondente.
  # Adicionar novos pares sem alterar codigo.
  estados_brasileiro:
    - RO
    - AC
    - AM
    - RR
    - PA
    - AP
    - TO
    - MA
    - PI
    - MT

  cidades_por_estado:
    EX: ESTADO INEXISTENTE
    RO: PORTO VELHO
    AC: RIO BRANCO
    AM: MANAUS
    RR: BOA VISTA
    PA: BELEM
    AP: MACAPA
    TO: PALMAS
    MA: SAO LUIS
    PI: TERESINA
    MT: CUIABA

  # ── Popup Estrangeiro — Pais de Origem ───────────────────────────────────
  # cenario: positivo — valores validos aceitos pelo SI3
  paises_estrangeiro:
    - ARGENTINA
    - CHILE
    - COLOMBIA
    - PARAGUAI
    - PERU
    - URUGUAY
    - BOLIVIA
    - VENEZUELA
    - EQUADOR
    - CUBA

  # cenario: negativo — valor invalido para testar deteccao de erro
  paises_estrangeiro_negativo:
    - XPTO_INVALIDO

  # ── Popup Naturalizado — Pais de Origem ──────────────────────────────────
  # cenario: positivo — Brasil obrigatorio + outros
  paises_naturalizado:
    - BRASIL
    - ARGENTINA
    - CHILE
    - PORTUGAL
    - ITALIA
    - ALEMANHA
    - ESPANHA
    - JAPAO
    - FRANCA
    - ESTADOS UNIDOS

  # cenario: negativo — valor invalido para testar deteccao de erro
  paises_naturalizado_negativo:
    - XPTO_INVALIDO

# ── regioes_ocr ──────────────────────────────────────────────────────────────
# { x1: 0, y1: 0, x2: 0, y2: 0 } = bootstrap (verificacao desabilitada)
regioes_ocr:
  campo_nome:          { x1: 27,  y1: 145, x2: 447, y2: 168 }  # calibrado
  campo_data_nasc:     { x1: 363, y1: 195, x2: 463, y2: 207 }  # calibrado
  campo_sexo:          { x1: 543, y1: 192, x2: 633, y2: 212 }  # calibrado
  campo_cor_etnia:     { x1: 22,  y1: 278, x2: 200, y2: 296 }  # calibrado
  campo_nacionalidade: { x1: 664, y1: 193, x2: 829, y2: 211 }  # calibrado ✅
